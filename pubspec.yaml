name: openlabel
description: OpenLabel — Consumer OSINT and Tech-Justice platform.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter:
    sdk: flutter
  flutter_image_compress: ^2.4.0
  flutter_launcher_icons: ^0.14.4
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.0.0
  flutter_tts: ^4.2.5
  freezed_annotation: ^3.1.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  go_router: ^16.0.0
  google_fonts: ^6.3.0
  image_picker: ^1.2.0
  json_annotation: ^4.11.0
  lottie: ^3.3.2
  screenshot: ^3.0.0
  share_plus: ^12.0.1
  supabase_flutter: ^2.12.2
  translator: ^1.0.4+1
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.5.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.11.1

flutter_icons:
  image_path: "assets/logo.png"
